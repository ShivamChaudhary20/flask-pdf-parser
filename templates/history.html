<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOB History - Parsed Records</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ── Card grid ── */
        .cards-grid {
            display: block;
            padding: 0 16px 20px;
        }
        .record-card {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 16px;
            background: #fff;
            border: 1px solid #d6e4f7;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(43,87,154,.07);
            overflow: hidden;
        }
        /* card header bar */
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: linear-gradient(90deg,#2b579a,#3b6fa0);
            color: #fff;
        }
        .card-header-left { display:flex; align-items:center; gap:10px; }
        .card-id {
            font-size: 11px; background: rgba(255,255,255,.2);
            border-radius: 4px; padding: 2px 7px; font-weight: 600;
        }
        .card-patient { font-size: 15px; font-weight: 700; }
        .card-badges { display:flex; gap:6px; align-items:center; }
        .badge { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:700; }
        .badge-ocr  { background:#f59e0b; color:#fff; }
        .badge-text { background:#22c55e; color:#fff; }
        .card-filename {
            font-size: 10px; color: rgba(255,255,255,.7);
            padding: 3px 14px 5px;
            background: rgba(0,0,0,.12);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        /* card body */
        .card-body { padding: 12px 14px 0; }
        .card-section-title {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            color: #3b6fa0; letter-spacing: .06em;
            border-bottom: 1px solid #e8f0fb; padding-bottom: 3px; margin: 8px 0 6px;
        }
        .card-fields {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 6px 10px;
        }
        .card-field label {
            display: block; font-size: 9px; text-transform: uppercase;
            color: #888; font-weight: 600; letter-spacing:.05em; margin-bottom:1px;
        }
        .card-field span {
            font-size: 12px; color: #1a2b45; font-weight: 500;
            word-break: break-word;
        }
        /* service lines mini table */
        .card-lines { margin: 10px 0 0; overflow-x: auto; }
        .card-lines table {
            width: 100%; border-collapse: collapse;
            font-size: 11px;
        }
        .card-lines th {
            background: #f0f5fb; color: #3b6fa0;
            font-size: 9px; text-transform: uppercase;
            padding: 4px 6px; text-align: right; font-weight: 700;
            border-bottom: 1px solid #d6e4f7;
        }
        .card-lines th:first-child,
        .card-lines th:nth-child(2),
        .card-lines th:nth-child(3) { text-align: left; }
        .card-lines td {
            padding: 4px 6px; border-bottom: 1px solid #f0f5fb;
            color: #1a2b45; text-align: right;
        }
        .card-lines td:first-child,
        .card-lines td:nth-child(2),
        .card-lines td:nth-child(3) { text-align: left; }
        .card-lines tr:last-child td { border-bottom: none; }
        /* card footer actions */
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 14px;
            border-top: 1px solid #e8f0fb;
            margin-top: 10px;
            background: #f8fbff;
        }
        .card-date { font-size: 11px; color: #888; }
        .card-actions { display:flex; gap:6px; }
        .btn-sm {
            padding: 4px 12px; font-size: 12px; border-radius: 4px;
            border: 1px solid; cursor: pointer; font-weight: 600;
        }
        .btn-load   { background:#2b579a; color:#fff; border-color:#2b579a; }
        .btn-load:hover { background:#1e3f73; }
        .btn-delete { background:#fff; color:#e53e3e; border-color:#e53e3e; }
        .btn-delete:hover { background:#e53e3e; color:#fff; }
        /* empty state */
        .cards-empty {
            text-align:center; padding:60px 20px; color:#999; font-size:14px;
            grid-column: 1/-1;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top-bar">
        <span class="patient-info"><i class="fa-solid fa-clock-rotate-left"></i> EOB Parse History</span>
        <div class="tabs">
            <a href="/" class="tab" style="text-decoration:none;color:inherit;"><i class="fa-solid fa-arrow-left"></i> Back to Form</a>
        </div>
    </div>

    <!-- Search -->
    <div class="history-toolbar">
        <input type="text" id="searchInput" class="history-search"
               placeholder="Search by patient, claim #, member ID, or filename...">
        <span class="record-count" id="recordCount"></span>
    </div>

    <!-- Cards -->
    <div class="cards-grid" id="cardsGrid">
        <div class="cards-empty">Loading...</div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

</div>

<script>
let currentPage = 1;
let searchTimeout = null;

document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => { currentPage = 1; loadRecords(); }, 300);
});

function loadRecords() {
    const search = document.getElementById('searchInput').value;
    const url = `/api/records?page=${currentPage}&per_page=12&search=${encodeURIComponent(search)}`;
    fetch(url).then(r => r.json()).then(data => {
        renderCards(data.records);
        renderPagination(data.page, data.pages, data.total);
        document.getElementById('recordCount').textContent =
            `${data.total} record${data.total !== 1 ? 's' : ''}`;
    });
}

function renderCards(records) {
    const grid = document.getElementById('cardsGrid');
    if (!records.length) {
        grid.innerHTML = '<div class="cards-empty">No records found</div>';
        return;
    }
    grid.innerHTML = records.map(r => cardHTML(r)).join('');
}

function cardHTML(r) {
    const ocr = r.used_ocr
        ? '<span class="badge badge-ocr">OCR</span>'
        : '<span class="badge badge-text">TEXT</span>';

    const f = (v) => esc(v) || '-';

    // service lines mini-table
    let linesHTML = '';
    if (r.service_lines && r.service_lines.length) {
        linesHTML = `
        <div class="card-section-title"><i class="fa-solid fa-list-ul" style="margin-right:4px"></i>Service Lines (${r.service_lines.length})</div>
        <div class="card-lines">
          <table>
            <thead><tr>
              <th>#</th><th>Date</th><th>Code</th><th>Units</th>
              <th>Billed</th><th>Disallow</th><th>Allowed</th>
              <th>Deduct</th><th>Copay</th><th>COB</th>
              <th>Withhold</th><th>Paid</th><th>Pt Resp</th>
            </tr></thead>
            <tbody>
              ${r.service_lines.map((sl, i) => `
                <tr>
                  <td>${i+1}</td>
                  <td>${esc(sl.date_of_service)||'-'}</td>
                  <td>${esc(sl.description)||'-'}</td>
                  <td>${sl.units||'-'}</td>
                  <td>${sl.billed_amt||'0.00'}</td>
                  <td>${sl.disallow_amt||'0.00'}</td>
                  <td>${sl.allowed_amt||'0.00'}</td>
                  <td>${sl.deduct_amt||'0.00'}</td>
                  <td>${sl.copay_coins_amt||'0.00'}</td>
                  <td>${sl.cob_pmt_amt||'0.00'}</td>
                  <td>${sl.withhold_amt||'0.00'}</td>
                  <td><strong>${sl.paid_to_provider_amt||'0.00'}</strong></td>
                  <td>${sl.patient_resp_amt||'0.00'}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    return `
    <div class="record-card">
      <div class="card-header">
        <div class="card-header-left">
          <span class="card-id">#${r.id}</span>
          <span class="card-patient">${f(r.patient_name)}</span>
        </div>
        <div class="card-badges">
          ${ocr}
          ${r.total_payable_to_provider ? `<span style="font-size:13px;font-weight:700;">$${r.total_payable_to_provider}</span>` : ''}
        </div>
      </div>
      <div class="card-filename" title="${esc(r.filename)}">
        <i class="fa-solid fa-file-pdf" style="margin-right:4px"></i>${esc(r.filename)}
      </div>
      <div class="card-body">

        <div class="card-section-title"><i class="fa-solid fa-user" style="margin-right:4px"></i>Patient &amp; Claim</div>
        <div class="card-fields">
          <div class="card-field"><label>Claim #</label><span>${f(r.claim_number)}</span></div>
          <div class="card-field"><label>Member ID</label><span>${f(r.member_id)}</span></div>
          <div class="card-field"><label>Subscriber ID</label><span>${f(r.subscriber_id)}</span></div>
          <div class="card-field"><label>Subscriber Name</label><span>${f(r.subscriber_name)}</span></div>
          <div class="card-field"><label>Date Received</label><span>${f(r.date_received)}</span></div>
          <div class="card-field"><label>Patient Account</label><span>${f(r.patient_account)}</span></div>
          <div class="card-field"><label>PCP #</label><span>${f(r.pcp_number)}</span></div>
          <div class="card-field"><label>PCP Name</label><span>${f(r.pcp_name)}</span></div>
        </div>

        <div class="card-section-title"><i class="fa-solid fa-hospital" style="margin-right:4px"></i>Provider &amp; Billing</div>
        <div class="card-fields">
          <div class="card-field"><label>Servicing Provider</label><span>${f(r.servicing_prov_nm)}</span></div>
          <div class="card-field"><label>Servicing NPI</label><span>${f(r.servicing_prov_npi)}</span></div>
          <div class="card-field"><label>Billing NPI</label><span>${f(r.billing_npi)}</span></div>
          <div class="card-field"><label>Carrier</label><span>${f(r.carrier_name || r.carrier_id)}</span></div>
          <div class="card-field"><label>Product</label><span>${f(r.product_desc)}</span></div>
          <div class="card-field"><label>Remit Detail</label><span>${f(r.remit_detail)}</span></div>
          <div class="card-field"><label>Payment Ref #</label><span>${f(r.payment_number)}</span></div>
          <div class="card-field"><label>Payment Date</label><span>${f(r.payment_date)}</span></div>
        </div>

        ${linesHTML}
      </div>
      <div class="card-footer">
        <span class="card-date"><i class="fa-regular fa-clock" style="margin-right:4px"></i>${formatDate(r.created_at)}</span>
        <div class="card-actions">
          <button class="btn-sm btn-load" onclick="loadToForm(${r.id})"><i class="fa-solid fa-upload" style="margin-right:4px"></i>Load</button>
          <button class="btn-sm btn-delete" onclick="deleteRecord(${r.id})"><i class="fa-solid fa-trash" style="margin-right:4px"></i>Delete</button>
        </div>
      </div>
    </div>`;
}

function renderPagination(page, pages, total) {
    const div = document.getElementById('pagination');
    if (pages <= 1) { div.innerHTML = ''; return; }
    let html = '';
    const start = Math.max(1, page - 3);
    const end   = Math.min(pages, page + 3);
    if (start > 1) html += `<button class="page-btn" onclick="goToPage(1)">1</button><span style="padding:0 4px">…</span>`;
    for (let i = start; i <= end; i++) {
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    if (end < pages) html += `<span style="padding:0 4px">…</span><button class="page-btn" onclick="goToPage(${pages})">${pages}</button>`;
    div.innerHTML = html;
}

function goToPage(p) { currentPage = p; loadRecords(); window.scrollTo(0,0); }

function loadToForm(id) { window.location.href = `/?record=${id}`; }

function deleteRecord(id) {
    if (!confirm('Delete this record permanently?')) return;
    fetch(`/api/records/${id}`, { method: 'DELETE' })
        .then(r => r.json()).then(() => loadRecords());
}

function formatDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

loadRecords();
</script>
</body>
</html>

<body>

<div class="container">

    <div class="top-bar">
        <span class="patient-info"><i class="fa-solid fa-clock-rotate-left"></i> EOB Parse History</span>
        <div class="tabs">
            <a href="/" class="tab" style="text-decoration:none;color:inherit;"><i class="fa-solid fa-arrow-left"></i> Back to Form</a>
        </div>
    </div>

    <!-- Search -->
    <div class="history-toolbar">
        <input type="text" id="searchInput" class="history-search"
               placeholder="Search by patient, claim #, member ID, or filename...">
        <span class="record-count" id="recordCount"></span>
    </div>

    <!-- Records Table -->
    <div class="table-wrapper" style="margin:0 16px 16px;">
        <table class="service-table history-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Date</th>
                    <th>Patient Name</th>
                    <th>Claim #</th>
                    <th>Member ID</th>
                    <th>Total Payable</th>
                    <th>Lines</th>
                    <th>OCR</th>
                    <th>Filename</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="10" style="text-align:center;padding:30px;color:#999;">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Record Details</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

</div>

<script>
let currentPage = 1;
let searchTimeout = null;

document.getElementById('searchInput').addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        currentPage = 1;
        loadRecords();
    }, 300);
});

function loadRecords() {
    const search = document.getElementById('searchInput').value;
    const url = `/api/records?page=${currentPage}&per_page=15&search=${encodeURIComponent(search)}`;

    fetch(url).then(r => r.json()).then(data => {
        renderTable(data.records);
        renderPagination(data.page, data.pages, data.total);
        document.getElementById('recordCount').textContent = `${data.total} record${data.total !== 1 ? 's' : ''}`;
    });
}

function renderTable(records) {
    const tbody = document.getElementById('historyBody');
    if (!records.length) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:30px;color:#999;">No records found</td></tr>';
        return;
    }
    tbody.innerHTML = records.map(r => `
        <tr>
            <td>${r.id}</td>
            <td>${formatDate(r.created_at)}</td>
            <td><strong>${esc(r.patient_name) || '-'}</strong></td>
            <td>${esc(r.claim_number) || '-'}</td>
            <td>${esc(r.member_id) || '-'}</td>
            <td>${r.total_payable_to_provider ? '$' + r.total_payable_to_provider : '-'}</td>
            <td>${r.service_lines.length}</td>
            <td>${r.used_ocr ? '<span class="badge badge-ocr">OCR</span>' : '<span class="badge badge-text">Text</span>'}</td>
            <td class="filename-cell" title="${esc(r.filename)}">${esc(r.filename)}</td>
            <td>
                <button class="btn-sm btn-view" onclick="viewRecord(${r.id})">View</button>
                <button class="btn-sm btn-load" onclick="loadToForm(${r.id})">Load</button>
                <button class="btn-sm btn-delete" onclick="deleteRecord(${r.id})">Delete</button>
            </td>
        </tr>
    `).join('');
}

function renderPagination(page, pages, total) {
    const div = document.getElementById('pagination');
    if (pages <= 1) { div.innerHTML = ''; return; }
    let html = '';
    for (let i = 1; i <= pages; i++) {
        html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    div.innerHTML = html;
}

function goToPage(p) {
    currentPage = p;
    loadRecords();
}

function viewRecord(id) {
    fetch(`/api/records/${id}`).then(r => r.json()).then(r => {
        document.getElementById('modalTitle').textContent = `Record #${r.id} — ${r.patient_name || 'Unknown'}`;
        let html = '<div class="detail-grid">';
        const fields = [
            ['Patient', r.patient_name], ['Claim #', r.claim_number],
            ['Member ID', r.member_id], ['Subscriber ID', r.subscriber_id],
            ['Subscriber Name', r.subscriber_name], ['Date Received', r.date_received],
            ['PCP #', r.pcp_number], ['PCP Name', r.pcp_name],
            ['Billing NPI', r.billing_npi], ['Servicing NPI', r.servicing_prov_npi],
            ['Servicing Prov', r.servicing_prov_nm], ['Carrier ID', r.carrier_id],
            ['Patient Account', r.patient_account], ['Product', r.product_desc],
            ['Remit Detail', r.remit_detail], ['Interest', r.interest_amount],
            ['Total Payable', r.total_payable_to_provider],
        ];
        fields.forEach(([label, val]) => {
            html += `<div class="detail-item"><span class="detail-label">${label}</span><span class="detail-value">${esc(val) || '-'}</span></div>`;
        });
        html += '</div>';

        if (r.service_lines.length) {
            html += '<h4 style="margin:16px 0 8px;">Service Lines</h4><div class="table-wrapper"><table class="service-table"><thead><tr>';
            html += '<th>#</th><th>Date</th><th>Desc</th><th>Units</th><th>Billed</th><th>Disallow</th><th>Allowed</th><th>Deduct</th><th>Copay</th><th>COB</th><th>Withhold</th><th>Paid</th><th>Pt Resp</th>';
            html += '</tr></thead><tbody>';
            r.service_lines.forEach((sl, i) => {
                html += `<tr><td>${i+1}</td><td>${sl.date_of_service}</td><td>${esc(sl.description)}</td><td>${sl.units}</td>`;
                html += `<td>${sl.billed_amt}</td><td>${sl.disallow_amt}</td><td>${sl.allowed_amt}</td><td>${sl.deduct_amt}</td>`;
                html += `<td>${sl.copay_coins_amt}</td><td>${sl.cob_pmt_amt}</td><td>${sl.withhold_amt}</td><td>${sl.paid_to_provider_amt}</td><td>${sl.patient_resp_amt}</td></tr>`;
            });
            html += '</tbody></table></div>';
        }

        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('modalOverlay').classList.add('show');
    });
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

function loadToForm(id) {
    // Navigate to main form with this record's data pre-loaded
    window.location.href = `/?record=${id}`;
}

function deleteRecord(id) {
    if (!confirm('Delete this record permanently?')) return;
    fetch(`/api/records/${id}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(() => loadRecords());
}

function formatDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function esc(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal();
});

loadRecords();
</script>

</body>
</html>
